<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TubeV2 Mobile</title>

  <!-- FORCE MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Optional background video */
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.25;
      pointer-events: none;
    }

    /* Player container */
    .player-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100vw;
      aspect-ratio: 16 / 9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 2;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- OPTIONAL BACKGROUND VIDEO -->
  <video
    id="bgVideo"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  >
    <source
      src="https://github.com/DoggyGamesShow123/tubev2/raw/refs/heads/main/Sonic%20Mega%20Collection%20Plus%20Extra%20Menu%20Theme%20and%20Backgound%20-%20Classic%20Sonic%20Saturn%20(360p,%20h264).mp4"
      type="video/mp4"
    />
  </video>

  <!-- BACK TO DESKTOP -->
  <button
    class="back-btn"
    onclick="location.href='index.html'"
    aria-label="Back to desktop version"
 clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </div>

</body>
</html>
