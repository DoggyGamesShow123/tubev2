<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TubeV2 Mobile</title>

  <!-- Force proper scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ===== PAGE BACKGROUND (BLACK BARS) ===== */
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* ===== FAKE MOBILE SCREEN ===== */
    .mobile-screen {
      width: 390px;          /* iPhone width */
      height: 844px;         /* iPhone height */
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Scale down on very small screens (real phones) */
    @media (max-width: 420px) {
      .mobile-screen {
        width: 100vw;
        height: 100vh;
      }
    }

    /* ===== VIDEO WRAPPER ===== */
    .player-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
      padding: 8px 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- MOBILE DEVICE FRAME -->
  <div class="mobile-screen">

    <!-- BACK TO DESKTOP -->
    <button
      class="back-btn"
      onclick="location.href='index.html'"
      aria-label="Back to desktop"
      title="Back to desktop"
   "https://www.youtube-nocookie.com/embed/Zy4oPoCDU4I?autoplay=1&playsinline=1&rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

  </div>

</body>
</html>
