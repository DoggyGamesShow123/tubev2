<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TubeV2 Mobile</title>

  <!-- Stable, mobile-first viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Page = theater background */
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Simulated mobile screen (Duck Player style) */
    .mobile-stage {
      width: 390px;     /* iPhone width */
      max-width: 100vw;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Maintain video integrity */
    .player-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    /* Back button (optional) */
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      background: rgba(0,0,0,.75);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  index.html
    ⬅ Desktop
  </button>

  <div class="mobile-stage">
    <div class="player-wrap">
      https://www.youtube-nocookie.com/embed/Zy4oPoCDU4I?playsinline=1&rel=0
      </iframe>
    </div>
  </div>

</body>
</html>
