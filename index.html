<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YouTube Watch (nocookie embed)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg1:#0b1020;
      --bg2:#141b38;
      --bg3:#070a14;
      --text:#e5e7eb;
    }

    * { box-sizing: border-box; }

    html,body {
      margin:0;
      height:100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      background-size:300% 300%;
      animation: bgShift 30s ease infinite;
      overflow:hidden;
    }

    @keyframes bgShift {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    /* Background video */
    #bgVideo {
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(.35);
      z-index:0;
      pointer-events:none;
    }

    /* Content */
    .wrap {
      position:relative;
      z-index:1;
      max-width:720px;
      margin:6vh auto;
      padding:24px;
    }

    h1 {
      margin-bottom:12px;
      font-size:1.25rem;
    }

    .controls {
      display:flex;
      gap:10px;
    }

    .controls input {
      flex:1;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#0f172a;
      color:#fff;
    }

    .controls button {
      padding:12px 16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }

    .player-wrap {
      margin-top:16px;
      aspect-ratio:16/9;
      border-radius:16px;
      overflow:hidden;
      background:#000;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    /* ✅ TOP‑RIGHT BUTTONS */
    .corner-controls {
      position:fixed;
      top:14px;
      right:14px;
      display:flex;
      gap:10px;
      z-index:2;
    }

    .corner-btn {
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(15,23,42,.75);
      color:#fff;
      font-size:16px;
      cursor:pointer;
      backdrop-filter:blur(6px);
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video id="bgVideo" autoplay loop muted playsinline preload="auto">
    <source src="./Sonic Mega Collection Plus Extra Menu Theme and Backgound - Classic Sonic Saturn (360p, h264).mp4" type="video/mp4">
  </video>

  <!-- ✅ TOP‑RIGHT: iPhone + Audio -->
  <div class="corner-controls">
    <!-- iPhone redirect -->
    <button
      class="corner-btn"
      onclick="location.href='https://doggygamesshow123.github.io/tubev2/mobile.html'"
      title="Open mobile version"
      aria-label="Open mobile version"
   udio"
    >🔇</button>
  </div>

  <div class="wrap">
    <h1>Watch a YouTube video (privacy‑enhanced)</h1>

    <div class="controls">
      <input id="ytUrl" placeholder="Paste YouTube link or ID">
      <button onclick="watch()">Watch</button>
    </div>

    <div class="player-wrap">
      <iframe
        id="player"
        src="https://www.youtube-nocookie.com/embed/Zy4oPoCDU4I"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    function extractId(v){
      const m=v.match(/[a-zA-Z0-9_-]{11}/);
      return m?m[0]:null;
    }

    function watch(){
      const id=extractId(document.getElementById("ytUrl").value);
      if(id){
        document.getElementById("player").src=
          "https://www.youtube-nocookie.com/embed/"+id+"?autoplay=1&rel=0";
      }
    }

    // Background audio toggle
    const bgVideo=document.getElementById("bgVideo");
    const btn=document.getElementById("audioToggle");

    btn.onclick=()=>{
      bgVideo.muted=!bgVideo.muted;
      btn.textContent=bgVideo.muted?"🔇":"🔊";
    };
  </script>

</body>
</html>
