<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YouTube Watch (nocookie embed)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --accent: #2563eb;
      --bg1: #0b1020;
      --bg2: #141b38;
      --bg3: #0b1020;
      --bg4: #070a14;
      --panel: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
      background-size: 300% 300%;
      animation: bgShift 28s ease-in-out infinite;
      overflow-x: hidden;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.35);
      z-index: 0;
      pointer-events: none;
    }

    #snowCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 6vh auto;
      padding: 24px;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 10px;
    }

    .controls input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0f172a;
      color: #fff;
      font-size: 14px;
    }

    .controls button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .player-wrap {
      margin-top: 16px;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* TOP‑RIGHT BUTTONS */
    .corner-controls {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 10px;
      z-index: 3;
    }

    .corner-btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video
    id="bgVideo"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  >
    <source src="./Sonic Mega Collection Plus Extra Menu Theme and Backgound - Classic Sonic Saturn (360p, h264).mp4">
  </video>

  <canvas id="snowCanvas"></canvas>

  <!-- TOP RIGHT BUTTONS -->
  <div class="corner-controls">
    <!-- 📱 REDIRECT ONLY -->
    <button
      class="corner-btn"
      onclick="location.href='https://doggygamesshow123.github.io/tubev2/mobile.html'"
      title="Open mobile version"
      aria-labelkground audio"
    >🔇</button>
  </div>

  <div class="wrap">
    <h1>Watch a YouTube video (privacy‑enhanced)</h1>

    <div class="controls">
      <input id="ytUrl" placeholder="Paste YouTube link or ID">
      <button onclick="watch()">Watch</button>
    </div>

    <div class="player-wrap">
      <iframe
        id="player"
        src="https://www.youtube-nocookie.com/embed/Zy4oPoCDU4I"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script>
    function extractId(url) {
      const m = url.match(/[a-zA-Z0-9_-]{11}/);
      return m ? m[0] : null;
    }

    function watch() {
      const v = extractId(document.getElementById("ytUrl").value);
      if (v) {
        document.getElementById("player").src =
          "https://www.youtube-nocookie.com/embed/" + v + "?autoplay=1&rel=0";
      }
    }

    /* Background audio toggle */
    const video = document.getElementById("bgVideo");
    const btn = document.getElementById("bgAudioToggle");

    btn.onclick = () => {
      video.muted = !video.muted;
      btn.textContent = video.muted ? "🔇" : "🔊";
    };
  </script>

</body>
</html>
